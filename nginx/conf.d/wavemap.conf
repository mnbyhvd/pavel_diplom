# ── HTTP → HTTPS redirect ──────────────────────────────────────
server {
    listen 80;
    server_name spotifika.ru;

    # Required for Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect everything else to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS main server ──────────────────────────────────────────
server {
    listen 443 ssl;
    http2 on;
    server_name spotifika.ru;

    # SSL certificates (issued by Let's Encrypt)
    ssl_certificate     /etc/letsencrypt/live/spotifika.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/spotifika.ru/privkey.pem;

    # Modern SSL settings
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000" always;
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header Referrer-Policy no-referrer-when-downgrade;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/javascript application/json;
    gzip_min_length 1000;

    client_max_body_size 50M;

    # Proxy to FastAPI app
    location / {
        proxy_pass         http://app:8000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;

        # Pass cookies through (needed for Spotify OAuth)
        proxy_pass_request_headers on;
    }

    # Static files served directly by nginx (faster than proxying)
    location /static/ {
        proxy_pass http://app:8000/static/;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
}
